{% extends 'base.html' %}
{% block title %}Masuk - Laundry Cloud{% endblock %}
{% block content %}
<div class="login-bg">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card login-card p-4">
                    <div class="card-body">
                        <div class="login-header">
                            <i class="bi bi-clouds-fill fs-1 text-primary"></i>
                            <h2 class="mt-2">LAUNDRY<span class="text-secondary">CLOUD</span></h2>
                            <p class="text-muted">Manajemen Transaksi Real-time</p>
                        </div>
                        <form method="POST" action="{{ url_for('login') }}">
                            <div class="mb-3">
                                <label for="username" class="form-label text-muted fw-semibold">Username</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0 text-muted"><i class="bi bi-person"></i></span>
                                    <input type="text" class="form-control bg-light border-start-0" id="username" name="username" placeholder="Masukkan username" required autocomplete="username">
                                </div>
                            </div>
                            <div class="mb-4">
                                <label for="password" class="form-label text-muted fw-semibold">Password</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0 text-muted"><i class="bi bi-lock"></i></span>
                                    <input type="password" class="form-control bg-light border-start-0" id="password" name="password" placeholder="Masukkan password" required autocomplete="current-password">
                                </div>
                            </div>
                            <div class="d-grid">
                                <button type="submit" class="btn btn-primary-custom py-2 shadow-sm"><i class="bi bi-box-arrow-in-right me-2"></i> Masuk</button>
                            </div>
                        </form>
                    </div>
                </div>
                <div class="text-center mt-3 text-muted">
                    <small>Hubungi Kami Jika Mau Laundry</small>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
