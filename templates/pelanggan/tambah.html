{% extends 'base.html' %}
{% block title %}Tambah Pelanggan - Laundry Cloud{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7">
        <div class="mb-4">
            <a href="{{ url_for('pelanggan_index') }}" class="text-decoration-none text-muted small"><i class="bi bi-arrow-left"></i> Kembali</a>
            <h1 class="h3 fw-bold mt-2">Tambah Pelanggan</h1>
        </div>
        <div class="card card-custom p-4">
            <form method="POST" action="{{ url_for('pelanggan_tambah') }}">
                <div class="mb-3">
                    <label class="form-label fw-semibold">Nama Lengkap</label>
                    <input type="text" class="form-control" name="nama" placeholder="Contoh: Andi Wijaya" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Nomor Handphone</label>
                    <input type="tel" class="form-control" name="no_hp" placeholder="Contoh: 0812XXXXXXXX" required>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-semibold">Alamat Lengkap</label>
                    <textarea class="form-control" name="alamat" rows="3" placeholder="Masukkan alamat lengkap..." required></textarea>
                </div>
                <div class="d-flex justify-content-end gap-2 border-top pt-3">
                    <a href="{{ url_for('pelanggan_index') }}" class="btn btn-light">Batal</a>
                    <button type="submit" class="btn btn-primary-custom px-4">Simpan Pelanggan</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
