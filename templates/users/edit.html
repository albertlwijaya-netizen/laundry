{% extends 'base.html' %}
{% block title %}Edit Pengguna - Laundry Cloud{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7">
        <div class="mb-4">
            <a href="{{ url_for('users_index') }}" class="text-decoration-none text-muted small"><i class="bi bi-arrow-left"></i> Kembali</a>
            <h1 class="h3 fw-bold mt-2">Edit Pengguna</h1>
        </div>
        <div class="card card-custom p-4">
            <form method="POST" action="{{ url_for('users_edit', id=user.id) }}">
                <div class="mb-3">
                    <label class="form-label fw-semibold">Nama Lengkap</label>
                    <input type="text" class="form-control" name="nama" value="{{ user.nama }}" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Username</label>
                    <input type="text" class="form-control" name="username" value="{{ user.username }}" required autocomplete="off">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Password (Plain text)</label>
                    <input type="text" class="form-control" name="password" value="{{ user.password }}" required autocomplete="new-password">
                </div>
                <div class="mb-4">
                    <label class="form-label fw-semibold">Role / Hak Akses</label>
                    <select class="form-select" name="role" required>
                        <option value="Petugas" {% if user.role == 'Petugas' %}selected{% endif %}>Petugas</option>
                        <option value="Admin" {% if user.role == 'Admin' %}selected{% endif %}>Admin</option>
                    </select>
                </div>
                <div class="d-flex justify-content-end gap-2 border-top pt-3">
                    <a href="{{ url_for('users_index') }}" class="btn btn-light">Batal</a>
                    <button type="submit" class="btn btn-primary-custom px-4">Perbarui</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
