{% extends 'base.html' %}
{% block title %}Transaksi Baru - Laundry Reza{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="mb-4">
            <a href="{{ url_for('transaksi_index') }}" class="text-decoration-none text-muted small"><i class="bi bi-arrow-left"></i> Kembali</a>
            <h1 class="h3 fw-bold mt-2">Tambah Transaksi Baru</h1>
        </div>
        <div class="card card-custom p-4">
            <form method="POST" action="{{ url_for('transaksi_tambah') }}">
                <div class="mb-3">
                    <label class="form-label fw-semibold">Pilih Pelanggan</label>
                    <select class="form-select" name="pelanggan_id" required>
                        <option value="" disabled selected>-- Pilih Pelanggan --</option>
                        {% for p in pelanggan_list %}
                            <option value="{{ p.id }}">{{ p.nama }} (ID: #{{ p.id }})</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-semibold">Berat (Kg)</label>
                        <div class="input-group">
                            <input type="number" step="0.01" class="form-control" id="berat" name="berat" placeholder="0.0" required min="0.01">
                            <span class="input-group-text">Kg</span>
                        </div>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-semibold">Harga per Kg (Rp)</label>
                        <div class="input-group">
                            <span class="input-group-text">Rp</span>
                            <input type="number" step="1" class="form-control" id="harga_per_kg" name="harga_per_kg" placeholder="7000" required min="1">
                        </div>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-semibold">Status</label>
                        <select class="form-select" name="status">
                            <option value="Diproses" selected>Diproses</option>
                            <option value="Selesai">Selesai</option>
                            <option value="Diambil">Diambil</option>
                        </select>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-semibold">Tanggal Masuk</label>
                        <input type="datetime-local" class="form-control" name="tanggal_masuk" value="{{ default_date }}" required>
                    </div>
                </div>
                
                <div class="bg-light p-3 rounded-3 mb-4 border">
                    <div class="d-flex justify-content-between align-items-center">
                        <span class="text-muted small fw-semibold">Estimasi Total Bayar:</span>
                        <input type="text" class="form-control border-0 bg-transparent text-end fw-bold text-primary fs-4 p-0" id="total" readonly value="Rp 0" style="width: auto;">
                    </div>
                </div>

                <div class="d-flex justify-content-end gap-2 border-top pt-3">
                    <a href="{{ url_for('transaksi_index') }}" class="btn btn-light">Batal</a>
                    <button type="submit" class="btn btn-primary-custom px-4">Simpan Transaksi</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
